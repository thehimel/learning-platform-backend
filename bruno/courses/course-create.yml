info:
  name: course-create
  type: http
  seq: 1

http:
  method: POST
  url: "{{courses}}"
  body:
    type: json
    data: |-
      {
        "title": "string",
        "description": "string",
        "add_me_as_instructor": true,
        "instructor_ids": [
          "{{instructor_user_id}}"
        ]
      }
  auth:
    type: bearer
    token: "{{admin_access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

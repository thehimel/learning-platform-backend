info:
  name: me-patch
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{users}}/me"
  body:
    type: json
    data: |-
      {
        "email": "{{student_username}}",
        "password": "{{student_password}}"
      }
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
